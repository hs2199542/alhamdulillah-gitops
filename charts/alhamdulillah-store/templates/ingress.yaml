{{- range $name, $service := .Values.services }}
{{- if not $service.isWorker }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $name }}-ingress
  annotations:
    kubernetes.io/ingress.class: {{ $.Values.global.ingressClass }}
    cert-manager.io/cluster-issuer: "letsencrypt-prod" # Auto-SSL
spec:
  tls:
  - hosts:
    - {{ $service.host }}
    secretName: {{ $name }}-tls
  rules:
  - host: {{ $service.host }}
    http:
      paths:
      - path: {{ $service.path }}
        pathType: Prefix
        backend:
          service:
            name: {{ $name }}-svc
            port:
              number: 80
---
{{- end }}
{{- end }}
